<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ver Pergunta</title>
</head>
<body>
    <h2>Pergunta</h2>
    <div id="perguntaContainer">Carregando...</div>
    <a href="/listar_perguntas">Voltar</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const perguntaAlvo = urlParams.get('pergunta');
        
        async function carregarPergunta() {
            if (!perguntaAlvo) {
                document.getElementById('perguntaContainer').innerHTML = 'Pergunta não encontrada!';
                return;
            }
            
            const response = await fetch(`/api/pergunta/${encodeURIComponent(perguntaAlvo)}`);
            const dados = await response.json();
            
            if (!dados) {
                document.getElementById('perguntaContainer').innerHTML = 'Pergunta não encontrada!';
                return;
            }
            
            let html = `
                <p><strong>Tipo:</strong> ${escapeHtml(dados[0])}</p>
                <p><strong>Pergunta:</strong> ${escapeHtml(dados[1])}</p>
            `;
            
            if (dados[0] === 'multipla') {
                html += `
                    <p><strong>Opções:</strong></p>
                    <ul>
                        <li>${escapeHtml(dados[2] || '')}</li>
                        <li>${escapeHtml(dados[3] || '')}</li>
                        <li>${escapeHtml(dados[4] || '')}</li>
                        <li>${escapeHtml(dados[5] || '')}</li>
                    </ul>
                    <p><strong>Resposta Correta:</strong> ${escapeHtml(dados[6] || '')}</p>
                `;
            } else {
                html += `<p><strong>Resposta:</strong> Texto livre (avaliado manualmente)</p>`;
            }
            
            document.getElementById('perguntaContainer').innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        carregarPergunta();
    </script>
</body>
</html>
