<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — Falls Car Admin</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileMenu()"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn-mobile-menu" onclick="toggleMobileMenu()">☰</button>
        <div>
          <div class="page-title">Clientes</div>
          <div class="page-subtitle">Gestão de clientes cadastrados</div>
        </div>
      </div>
    </div>

    <div class="page-content">
      <div class="filters-bar">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="Buscar nome, e-mail, CPF…" oninput="applyFilters()">
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Cidade</th>
                <th>CNH</th>
                <th>Cadastro</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Detalhes do Cliente</h3>
      <button class="modal-close" onclick="Modal.close('modal-cliente')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-cliente" novalidate>
        <input type="hidden" id="c-id">
        <div class="form-row cols-2">
          <div class="form-group">
            <label class="form-label">Nome completo</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" required>
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" class="form-control" maxlength="14">
          </div>
          <div class="form-group">
            <label class="form-label">Telefone</label>
            <input type="text" name="telefone" class="form-control">
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" name="data_nascimento" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">CNH</label>
            <input type="text" name="cnh" class="form-control">
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label class="form-label">Endereço</label>
            <input type="text" name="endereco" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Cidade</label>
            <input type="text" name="cidade" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">CEP</label>
          <input type="text" name="cep" class="form-control" style="max-width:200px">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('modal-cliente')">Fechar</button>
      <button class="btn btn-primary" onclick="salvar()">Salvar alterações</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script>
let allClientes = [];

document.addEventListener('DOMContentLoaded', async () => {
  Auth.requireAdmin();
  renderAdminSidebar('clientes');
  await loadClientes();
});

async function loadClientes() {
  tableLoading(document.getElementById('tbody'), 9);
  try {
    const res = await API.clientes.list();
    allClientes = res.data || [];
    applyFilters();
  } catch (e) {
    tableEmpty(document.getElementById('tbody'), 'Erro ao carregar clientes', 9);
  }
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allClientes.filter(c =>
    !q || `${c.nome} ${c.email} ${c.cpf}`.toLowerCase().includes(q)
  );
  renderTabela(filtered);
}

function renderTabela(lista) {
  const tbody = document.getElementById('tbody');
  if (!lista.length) { tableEmpty(tbody, 'Nenhum cliente encontrado', 9); return; }
  tbody.innerHTML = lista.map(c => `
    <tr>
      <td>${c.id}</td>
      <td><strong>${c.nome}</strong></td>
      <td>${c.email}</td>
      <td>${fmtCPF(c.cpf)}</td>
      <td>${fmtTel(c.telefone)}</td>
      <td>${c.cidade || '—'}</td>
      <td>${c.cnh || '—'}</td>
      <td style="font-size:.8rem">${fmtData(c.created_at)}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-ghost btn-sm btn-icon" title="Editar" onclick='openModal(${JSON.stringify(c)})'>✏️</button>
          <button class="btn btn-ghost btn-sm btn-icon" title="Excluir" onclick="excluir(${c.id})">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openModal(c) {
  document.getElementById('c-id').value = c.id;
  const form = document.getElementById('form-cliente');
  const fields = ['nome','email','cpf','telefone','data_nascimento','cnh','endereco','cidade','cep'];
  fields.forEach(f => {
    if (form[f]) form[f].value = f === 'data_nascimento' ? toInputDate(c[f]) : (c[f] ?? '');
  });
  Modal.open('modal-cliente');
}

async function salvar() {
  const id   = document.getElementById('c-id').value;
  const data = formData(document.getElementById('form-cliente'));
  try {
    await API.clientes.update(id, data);
    Toast.success('Cliente atualizado!');
    Modal.close('modal-cliente');
    await loadClientes();
  } catch (e) {
    Toast.error(e.message || 'Erro ao salvar');
  }
}

async function excluir(id) {
  const ok = await confirmar('Excluir este cliente permanentemente?');
  if (!ok) return;
  try {
    await API.clientes.delete(id);
    Toast.success('Cliente excluído!');
    await loadClientes();
  } catch (e) {
    Toast.error(e.message || 'Erro ao excluir');
  }
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
</script>
</body>
</html>
